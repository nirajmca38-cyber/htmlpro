<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stylish Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
        }
        h1 {
            margin-top: 20px;
        }
        img {
            width: 200px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #ff5733;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #e64a19;
        }
    </style>
</head>
<body>

    <header>
        <h2>My Website</h2>
    </header>

    <h1>Welcome 👋</h1>
    <p>This is an improved version of your page.</p>

    <img src="https://via.placeholder.com/200" alt="Sample Image">

    <br>
    <button onclick="changeText()">Click Me</button>

    <p id="message"></p>

    <script>
        function changeText() {
            document.getElementById("message").innerText = "You clicked the button! 🚀";
        }
    </script>

</body>
</html>
